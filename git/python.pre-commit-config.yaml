repos:

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-ast
  - id: check-builtin-literals
  - id: debug-statements
  - id: name-tests-test
  - id: requirements-txt-fixer

# Ruff replaces black, flake8, isort, pyupgrade, and (via the formatter) blacken-docs.
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.11
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format

# ty: Astral's Python type checker. No official pre-commit repo; run from PATH.
# Install locally with `uv tool install ty`.
- repo: local
  hooks:
  - id: ty
    name: ty check
    entry: ty check
    language: system
    types: [python]
    pass_filenames: false

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
  - id: python-check-blanket-noqa
  - id: python-no-log-warn
  - id: python-no-eval
  - id: rst-backticks
    files: \.rst$
    types: [file]
  - id: python-use-type-annotations
  - id: text-unicode-replacement-char

- repo: https://github.com/mgedmin/check-manifest
  rev: '0.50'
  hooks:
  - id: check-manifest
